# Read the Docs configuration file for Zensical
# See https://docs.readthedocs.com/platform/latest/intro/zensical.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  jobs:
    pre_build:
      # Install the package for mkdocstrings to resolve API references
      - pip install git+https://github.com/Oaklight/weilink.git
    install:
      - pip install -r requirements.txt
    build:
      html:
        - zensical build
    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/html/
      - cp --recursive site/* $READTHEDOCS_OUTPUT/html/
