name: Docker Build & Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.3.0)"
        required: true

permissions:
  contents: read

jobs:
  # Run CI checks before building
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/ examples/
      - run: ruff format --check src/ tests/ examples/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ty
      - run: ty check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[test]"
      - run: pytest tests/ -v

  # Build and push multi-arch image after checks pass and PyPI has the version
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.version }}"
          # Strip leading 'v' if present (v0.3.0 -> 0.3.0)
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Waiting for weilink==$VERSION on PyPI..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/weilink/$VERSION/json")
            if [ "$STATUS" = "200" ]; then
              echo "Found weilink==$VERSION on PyPI."
              exit 0
            fi
            echo "Attempt $i/30: not yet available (HTTP $STATUS), waiting 30s..."
            sleep 30
          done
          echo "::error::weilink==$VERSION not found on PyPI after 15 minutes."
          exit 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            oaklight/weilink:latest
            oaklight/weilink:${{ steps.version.outputs.version }}
          build-args: |
            PACKAGE_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
