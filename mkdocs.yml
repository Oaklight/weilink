site_name: WeiLink
site_description: 轻量级微信 iLink Bot 协议 Python SDK
site_author: Peng Ding
site_url: https://weilink.readthedocs.io/zh-cn/
repo_name: Oaklight/weilink
repo_url: https://github.com/Oaklight/weilink
copyright: Copyright &copy; 2026 Peng Ding

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: 切换到浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 跟随系统设置
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oaklight/weilink
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/weilink/
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: 中文
      link: /zh-cn/
      lang: zh

nav:
  - 首页: index.md
  - 使用指南:
      - 安装: usage/installation.md
      - 快速开始: usage/quickstart.md
      - 多会话: usage/multi_session.md
      - 注意事项: usage/gotchas.md
  - 架构: architecture.md
  - API 参考:
      - WeiLink: api/client.md
      - 数据模型: api/models.md
  - 示例:
      - 回声机器人: examples/echo_bot.md
  - 更新日志: changelog.md
